spring.application.name=bookstore
server.port=8999

# JPA and Hibernate Properties
spring.jpa.hibernate.ddl-auto=update

# H2 In-Memory Database Connection Settings
spring.datasource.url=jdbc:h2:mem:bookstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 web console at /h2-console
spring.h2.console.enabled=true

# Open Library public API (used by the external-books endpoints)
openlibrary.base-url=https://openlibrary.org